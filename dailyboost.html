<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Boost</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    :focus-visible { outline: 3px solid #2563eb; outline-offset: 3px; }
    .bounce-soft { animation: bounceSoft .7s ease both; }
    @keyframes bounceSoft { 0%{transform:translateY(12px);opacity:.3} 60%{transform:translateY(-6px);opacity:1} 100%{transform:translateY(0)} }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-100 via-indigo-100 to-emerald-100 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-4xl items-center justify-center p-4">
    <section class="w-full rounded-3xl bg-white/90 p-6 shadow-2xl md:p-10" aria-labelledby="app-title">
      <div class="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
        <div>
          <p class="text-sm font-bold uppercase tracking-wide text-indigo-700">Local-first wellness micro-game</p>
          <h1 id="app-title" class="text-3xl font-black md:text-4xl">Daily Boost</h1>
          <p class="mt-2 max-w-2xl text-slate-600">A quick reflection and affirmation game. Progress is saved only in this browser. This is not health advice or treatment.</p>
        </div>
        <button id="langBtn" class="rounded-lg bg-slate-900 px-4 py-2 font-bold text-white">FR</button>
      </div>

      <div class="mt-8 grid gap-4 md:grid-cols-3" aria-label="Score summary">
        <article class="rounded-2xl bg-emerald-50 p-4"><h2 class="font-bold text-emerald-900">Streak</h2><p id="streak" class="mt-1 text-3xl font-black text-emerald-700">0</p></article>
        <article class="rounded-2xl bg-blue-50 p-4"><h2 class="font-bold text-blue-900">Boosts</h2><p id="boosts" class="mt-1 text-3xl font-black text-blue-700">0</p></article>
        <article class="rounded-2xl bg-purple-50 p-4"><h2 class="font-bold text-purple-900">Mood</h2><p id="mood" class="mt-1 text-3xl font-black text-purple-700">🙂</p></article>
      </div>

      <div class="mt-8 rounded-3xl bg-indigo-50 p-6 text-center">
        <div id="emoji" class="text-6xl" aria-hidden="true">🌤️</div>
        <p id="affirmation" class="mt-4 min-h-24 text-2xl font-bold leading-snug text-indigo-950">Press the button for a short daily boost.</p>
      </div>

      <div class="mt-6 grid gap-3 md:grid-cols-3">
        <button id="boostBtn" class="rounded-xl bg-indigo-700 px-5 py-4 text-lg font-black text-white hover:bg-indigo-800">Give me a boost</button>
        <button id="doneBtn" class="rounded-xl bg-emerald-700 px-5 py-4 text-lg font-black text-white hover:bg-emerald-800">Mark today complete</button>
        <button id="resetBtn" class="rounded-xl bg-slate-200 px-5 py-4 text-lg font-black hover:bg-slate-300">Reset</button>
      </div>

      <label class="mt-6 grid gap-2 font-bold">One useful thing I can do next
        <textarea id="reflection" rows="3" class="rounded-xl border border-slate-300 p-3" placeholder="Write one small next action..."></textarea>
      </label>
      <p id="savedNote" class="mt-3 text-sm text-slate-500" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'rbottawa-daily-boost-v2';
    const content = {
      en: {
        boosts: ['You can make the next step smaller.', 'Progress is still progress when it is quiet.', 'Start with the task that takes two minutes.', 'A clear boundary is a productivity tool.', 'One useful action beats ten vague intentions.', 'Today does not need to be perfect to count.'],
        complete: 'Marked complete for today.', reset: 'Local progress reset.'
      },
      fr: {
        boosts: ['Réduisez la prochaine étape.', 'Un petit progrès compte quand même.', 'Commencez par une tâche de deux minutes.', 'Une limite claire aide la productivité.', 'Une action utile vaut mieux que dix intentions vagues.', 'La journée n’a pas besoin d’être parfaite pour compter.'],
        complete: 'Journée marquée comme terminée.', reset: 'Progrès local réinitialisé.'
      }
    };
    let lang = 'en';
    const $ = id => document.getElementById(id);
    const today = () => new Date().toISOString().slice(0,10);
    function load(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { boosts:0, streak:0, lastComplete:null, reflection:'' };}catch{return { boosts:0, streak:0, lastComplete:null, reflection:'' };} }
    function save(state){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function render(){ const s=load(); $('streak').textContent=s.streak; $('boosts').textContent=s.boosts; $('reflection').value=s.reflection || ''; $('mood').textContent=s.streak>=7?'😄':s.streak>=3?'🙂':'🌱'; }
    function randomBoost(){ const s=load(); const list=content[lang].boosts; const text=list[Math.floor(Math.random()*list.length)]; s.boosts += 1; save(s); $('affirmation').textContent=text; $('emoji').textContent=['🌤️','💪','🌱','🧭','✨','☕'][Math.floor(Math.random()*6)]; $('affirmation').classList.remove('bounce-soft'); void $('affirmation').offsetWidth; $('affirmation').classList.add('bounce-soft'); render(); }
    $('boostBtn').addEventListener('click', randomBoost);
    $('doneBtn').addEventListener('click',()=>{ const s=load(); if(s.lastComplete!==today()){ const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10); s.streak = s.lastComplete===yesterday ? s.streak+1 : 1; s.lastComplete=today(); save(s); } $('savedNote').textContent=content[lang].complete; render(); });
    $('resetBtn').addEventListener('click',()=>{ if(confirm('Reset local Daily Boost progress?')){ localStorage.removeItem(STORAGE_KEY); $('savedNote').textContent=content[lang].reset; render(); } });
    $('reflection').addEventListener('input',()=>{ const s=load(); s.reflection=$('reflection').value; save(s); $('savedNote').textContent='Saved locally.'; });
    $('langBtn').addEventListener('click',()=>{ lang=lang==='en'?'fr':'en'; document.documentElement.lang=lang==='en'?'en-CA':'fr-CA'; $('langBtn').textContent=lang==='en'?'FR':'EN'; randomBoost(); });
    render();
  </script>
</body>
</html>
