<!DOCTYPE html>
<html lang="en-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Decision Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        input[type="range"] { accent-color: #2563eb; }
        .decision-card { min-height: 10rem; }
        .lang-btn[aria-pressed="true"] { background: #2563eb; color: #fff; border-color: #2563eb; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 sm:p-6 flex items-center justify-center">
    <main class="bg-white shadow-xl rounded-xl p-6 sm:p-8 w-full max-w-2xl" aria-labelledby="main-title">
        <header class="mb-6 text-center">
            <h1 id="main-title" class="text-3xl sm:text-4xl font-bold text-slate-800">Management Decision Maker</h1>
            <p id="tool-description" class="text-slate-600 mt-2">Get clear, ambiguous, or firm decisions instantly.</p>
        </header>

        <section aria-label="Language selection" class="mb-6 flex justify-center gap-3">
            <button id="lang-en" type="button" class="lang-btn text-sm sm:text-base font-medium py-2 px-4 rounded-md border border-slate-300 hover:bg-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" aria-pressed="true">English</button>
            <button id="lang-fr" type="button" class="lang-btn text-sm sm:text-base font-medium py-2 px-4 rounded-md border border-slate-300 hover:bg-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" aria-pressed="false">Français</button>
        </section>

        <section id="sliders-container" class="mb-8 p-4 border border-slate-200 rounded-lg bg-slate-50" aria-labelledby="sliders-title">
            <h2 id="sliders-title" class="text-lg font-semibold text-slate-700 mb-4 text-center">Adjust Decision Likelihood</h2>
            <div class="space-y-4">
                <div>
                    <label id="label-approval-chance" for="approval-chance" class="block text-sm font-medium text-slate-700 mb-1">Approval Chance:</label>
                    <div class="flex items-center gap-3">
                        <input type="range" id="approval-chance" name="approval-chance" min="0" max="100" value="33" class="w-full">
                        <output id="approval-chance-value" for="approval-chance" class="text-sm text-slate-600 w-12 text-right">33%</output>
                    </div>
                </div>
                <div>
                    <label id="label-ambiguous-chance" for="ambiguous-chance" class="block text-sm font-medium text-slate-700 mb-1">Ambiguous Chance:</label>
                    <div class="flex items-center gap-3">
                        <input type="range" id="ambiguous-chance" name="ambiguous-chance" min="0" max="100" value="34" class="w-full">
                        <output id="ambiguous-chance-value" for="ambiguous-chance" class="text-sm text-slate-600 w-12 text-right">34%</output>
                    </div>
                </div>
                <div>
                    <label id="label-denial-chance" for="denial-chance" class="block text-sm font-medium text-slate-700 mb-1">Denial Chance:</label>
                    <div class="flex items-center gap-3">
                        <input type="range" id="denial-chance" name="denial-chance" min="0" max="100" value="33" class="w-full">
                        <output id="denial-chance-value" for="denial-chance" class="text-sm text-slate-600 w-12 text-right">33%</output>
                    </div>
                </div>
            </div>
        </section>

        <section id="decision-area" class="decision-card bg-slate-100 border border-slate-200 rounded-lg p-6 mb-6 flex flex-col items-center justify-center text-center" aria-live="polite" aria-atomic="true">
            <p id="decision-category" class="text-lg sm:text-xl font-semibold mb-2"></p>
            <p id="decision-expression" class="text-xl sm:text-2xl text-slate-700"></p>
            <p id="placeholder-text" class="text-slate-500 text-lg">Click the button below to get a decision.</p>
        </section>

        <div class="text-center">
            <button id="get-decision-btn" type="button" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md hover:shadow-lg transition-all duration-300 ease-in-out focus:outline-none focus:ring-4 focus:ring-blue-300 text-base sm:text-lg">Get Decision</button>
        </div>

        <footer class="mt-8 text-center">
            <p id="disclaimer-text" class="text-xs text-slate-500">This tool provides a randomized selection of pre-defined expressions for facilitation and brainstorming only.</p>
        </footer>
    </main>

    <script>
        'use strict';

        const uiStrings = {
            en: {
                htmlLang: 'en-CA',
                title: 'Management Decision Maker',
                description: 'Get clear, ambiguous, or firm decisions instantly.',
                getDecisionButton: 'Get Decision',
                placeholder: 'Click the button below to get a decision.',
                disclaimer: 'This tool provides a randomized selection of pre-defined expressions for facilitation and brainstorming only.',
                categoryApproval: 'Approval',
                categoryDenial: 'Denial',
                categoryAmbiguous: 'Ambiguous',
                slidersTitle: 'Adjust Decision Likelihood',
                labelApprovalChance: 'Approval Chance:',
                labelAmbiguousChance: 'Ambiguous Chance:',
                labelDenialChance: 'Denial Chance:'
            },
            fr: {
                htmlLang: 'fr-CA',
                title: "Outil d'aide à la décision managériale",
                description: 'Obtenez instantanément des décisions claires, ambiguës ou fermes.',
                getDecisionButton: 'Obtenir une décision',
                placeholder: 'Cliquez sur le bouton ci-dessous pour obtenir une décision.',
                disclaimer: "Cet outil fournit une sélection aléatoire d'expressions prédéfinies pour la facilitation et la réflexion seulement.",
                categoryApproval: 'Approbation',
                categoryDenial: 'Refus',
                categoryAmbiguous: 'Ambiguë',
                slidersTitle: 'Ajuster la probabilité de décision',
                labelApprovalChance: "Probabilité d'approbation :",
                labelAmbiguousChance: "Probabilité d'ambiguïté :",
                labelDenialChance: 'Probabilité de refus :'
            }
        };

        const expressions = {
            en: {
                approval: [
                    'Approved. Proceed with confidence.',
                    'This is a green light. Move forward.',
                    'This aligns with the current objective. Approved.',
                    'The proposal is sound. Proceed.',
                    'Support is confirmed. Advance to the next step.'
                ],
                ambiguous: [
                    'More evidence is required before a final decision.',
                    'The case is plausible, but the risk profile needs review.',
                    'Defer pending additional analysis.',
                    'Clarify assumptions and return with options.',
                    'This requires stakeholder validation before proceeding.'
                ],
                denial: [
                    'Declined under the current constraints.',
                    'This does not meet the decision criteria at this time.',
                    'Do not proceed without a revised approach.',
                    'The risks outweigh the benefits. Declined.',
                    'This is not aligned with current priorities.'
                ]
            },
            fr: {
                approval: [
                    'Approuvé. Procédez avec confiance.',
                    'Ceci est un feu vert. Allez de l\'avant.',
                    "La proposition est conforme à l'objectif actuel. Approuvée.",
                    'La proposition est solide. Procédez.',
                    "L'appui est confirmé. Passez à l'étape suivante."
                ],
                ambiguous: [
                    'Des éléments probants supplémentaires sont requis avant une décision finale.',
                    "Le dossier est plausible, mais le profil de risque doit être examiné.",
                    "Décision reportée en attente d'une analyse supplémentaire.",
                    'Clarifiez les hypothèses et revenez avec des options.',
                    "Une validation des intervenants est requise avant d'aller de l'avant."
                ],
                denial: [
                    'Refusé dans les contraintes actuelles.',
                    'Cela ne répond pas aux critères de décision pour le moment.',
                    "Ne procédez pas sans une approche révisée.",
                    "Les risques l'emportent sur les avantages. Refusé.",
                    "Ce n'est pas conforme aux priorités actuelles."
                ]
            }
        };

        const categories = ['approval', 'ambiguous', 'denial'];
        const categoryColors = {
            approval: 'text-green-600',
            ambiguous: 'text-amber-600',
            denial: 'text-red-600'
        };

        let currentLanguage = 'en';

        const elements = {
            mainTitle: document.getElementById('main-title'),
            description: document.getElementById('tool-description'),
            langEn: document.getElementById('lang-en'),
            langFr: document.getElementById('lang-fr'),
            getDecision: document.getElementById('get-decision-btn'),
            category: document.getElementById('decision-category'),
            expression: document.getElementById('decision-expression'),
            placeholder: document.getElementById('placeholder-text'),
            disclaimer: document.getElementById('disclaimer-text'),
            slidersTitle: document.getElementById('sliders-title'),
            labels: {
                approval: document.getElementById('label-approval-chance'),
                ambiguous: document.getElementById('label-ambiguous-chance'),
                denial: document.getElementById('label-denial-chance')
            }
        };

        const sliderControls = categories.map((key) => ({
            key,
            input: document.getElementById(`${key === 'approval' ? 'approval' : key}-chance`),
            output: document.getElementById(`${key === 'approval' ? 'approval' : key}-chance-value`)
        }));

        function updateSliderOutputs() {
            sliderControls.forEach(({ input, output }) => { output.value = `${input.value}%`; output.textContent = `${input.value}%`; });
        }

        function normalizeSliders(changedInput) {
            const changed = sliderControls.find((control) => control.input === changedInput);
            const changedValue = Number(changed.input.value);
            const others = sliderControls.filter((control) => control.input !== changedInput);
            const remaining = 100 - changedValue;
            const otherTotal = others.reduce((sum, control) => sum + Number(control.input.value), 0);

            if (otherTotal === 0) {
                const split = Math.floor(remaining / 2);
                others[0].input.value = String(split);
                others[1].input.value = String(remaining - split);
            } else {
                let firstValue = Math.round((Number(others[0].input.value) / otherTotal) * remaining);
                firstValue = Math.max(0, Math.min(100, firstValue));
                others[0].input.value = String(firstValue);
                others[1].input.value = String(remaining - firstValue);
            }
            updateSliderOutputs();
        }

        function setLanguage(language) {
            currentLanguage = language;
            const text = uiStrings[language];
            document.documentElement.lang = text.htmlLang;
            document.title = text.title;
            elements.mainTitle.textContent = text.title;
            elements.description.textContent = text.description;
            elements.getDecision.textContent = text.getDecisionButton;
            elements.disclaimer.textContent = text.disclaimer;
            elements.slidersTitle.textContent = text.slidersTitle;
            elements.labels.approval.textContent = text.labelApprovalChance;
            elements.labels.ambiguous.textContent = text.labelAmbiguousChance;
            elements.labels.denial.textContent = text.labelDenialChance;
            elements.placeholder.textContent = text.placeholder;
            elements.langEn.setAttribute('aria-pressed', String(language === 'en'));
            elements.langFr.setAttribute('aria-pressed', String(language === 'fr'));
            if (elements.category.dataset.categoryKey) {
                updateDecisionText(elements.category.dataset.categoryKey);
            }
        }

        function chooseWeightedCategory() {
            const weights = sliderControls.map(({ input }) => Number(input.value));
            const total = weights.reduce((sum, value) => sum + value, 0);
            if (total <= 0) return categories[Math.floor(Math.random() * categories.length)];
            let cursor = Math.random() * total;
            for (let i = 0; i < categories.length; i += 1) {
                if (cursor < weights[i]) return categories[i];
                cursor -= weights[i];
            }
            return categories[categories.length - 1];
        }

        function updateDecisionText(categoryKey) {
            const pool = expressions[currentLanguage][categoryKey];
            const expression = pool[Math.floor(Math.random() * pool.length)];
            const label = uiStrings[currentLanguage][`category${categoryKey.charAt(0).toUpperCase()}${categoryKey.slice(1)}`];
            elements.category.dataset.categoryKey = categoryKey;
            elements.category.className = `text-lg sm:text-xl font-semibold mb-2 ${categoryColors[categoryKey]}`;
            elements.category.textContent = label;
            elements.expression.textContent = expression;
            elements.placeholder.hidden = true;
        }

        elements.langEn.addEventListener('click', () => setLanguage('en'));
        elements.langFr.addEventListener('click', () => setLanguage('fr'));
        elements.getDecision.addEventListener('click', () => updateDecisionText(chooseWeightedCategory()));
        sliderControls.forEach(({ input }) => input.addEventListener('input', () => normalizeSliders(input)));

        updateSliderOutputs();
        setLanguage(currentLanguage);
    </script>
</body>
</html>
