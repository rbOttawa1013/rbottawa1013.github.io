<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pomodoro Timer - Boost productivity with the Pomodoro Technique. Track work sessions and breaks with an interactive timer.">
    <meta name="theme-color" content="#1f2937">
    <title>Pomodoro Timer - Productivity Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com" defer></script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        
        body, .timer-card {
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        
        .focusable:focus-visible {
            outline: 3px solid #4F46E5;
            outline-offset: 2px;
        }
        
        .mode-btn {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .mode-btn.active {
            border-bottom: 3px solid currentColor;
        }
    </style>
</head>
<body class="antialiased text-slate-800 bg-gradient-to-br from-gray-900 to-gray-800">
    <div id="app" class="min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-500">
        <!-- Main Timer Card -->
        <div class="w-full max-w-md mx-auto bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-6 md:p-8 timer-card transition-colors duration-500">
            <!-- Mode Tabs -->
            <div class="flex justify-center space-x-3 mb-8" role="tablist">
                <button id="pomodoro-btn" class="mode-btn focusable font-semibold px-4 py-2 rounded-full text-sm transition-all" role="tab" aria-selected="true" aria-label="Pomodoro mode (25 minutes)">🍅 Pomodoro</button>
                <button id="short-break-btn" class="mode-btn focusable font-semibold px-4 py-2 rounded-full text-sm transition-all" role="tab" aria-selected="false" aria-label="Short break mode (5 minutes)">☕ Break</button>
                <button id="long-break-btn" class="mode-btn focusable font-semibold px-4 py-2 rounded-full text-sm transition-all" role="tab" aria-selected="false" aria-label="Long break mode (15 minutes)">🌴 Long</button>
            </div>
            
            <!-- Timer Display -->
            <div class="relative w-48 h-48 sm:w-64 sm:h-64 mx-auto mb-8" role="img" aria-label="Timer display">
                <svg class="w-full h-full" viewBox="0 0 120 120" aria-hidden="true">
                    <circle class="text-gray-300/50" stroke-width="8" stroke="currentColor" fill="transparent" r="56" cx="60" cy="60"/>
                    <circle id="progress-ring" class="progress-ring__circle text-indigo-600"
                        stroke-width="8"
                        stroke-linecap="round"
                        stroke="currentColor"
                        fill="transparent"
                        r="56"
                        cx="60"
                        cy="60"/>
                </svg>
                <div id="timer-display" class="absolute inset-0 flex items-center justify-center text-5xl md:text-6xl font-bold text-gray-900" aria-live="polite" aria-atomic="true">
                    25:00
                </div>
            </div>
            
            <!-- Task Input -->
            <div class="text-center mb-8">
                <input type="text" id="task-title" placeholder="What are you working on?" class="text-center bg-transparent border-b-2 border-gray-300 text-lg w-full focus:ring-0 focus:border-indigo-500 focus:outline-none focusable transition-colors" aria-label="Current task description">
            </div>
            
            <!-- Controls -->
            <div class="flex items-center justify-center space-x-4 mb-8">
                <button id="reset-btn" class="p-3 focusable rounded-full hover:bg-gray-200/50 transition-colors" aria-label="Reset timer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                    </svg>
                </button>
                <button id="start-pause-btn" class="w-20 h-20 focusable bg-indigo-600 text-white rounded-full text-sm font-bold uppercase tracking-wider shadow-lg hover:bg-indigo-700 active:scale-95 transition-all" aria-label="Start or pause timer">
                    START
                </button>
                <button id="sound-toggle-btn" class="p-3 focusable rounded-full hover:bg-gray-200/50 transition-colors" aria-label="Toggle sound" aria-pressed="true"></button>
            </div>
        </div>
        
        <!-- Settings & Info Footer -->
        <div class="text-center mt-8 text-sm text-white">
            <div class="flex flex-col sm:flex-row items-center justify-center space-y-4 sm:space-y-0 sm:space-x-6">
                <label for="auto-start-toggle" class="flex items-center cursor-pointer select-none">
                    <span class="mr-3 font-medium">Auto-start?</span>
                    <div class="relative w-12 h-7 bg-gray-600 rounded-full transition-colors" id="toggle-bg">
                        <input type="checkbox" id="auto-start-toggle" class="sr-only focusable">
                        <div id="auto-start-dot" class="absolute left-1 top-1 w-5 h-5 bg-white rounded-full transition-transform duration-300" aria-hidden="true"></div>
                    </div>
                </label>
                <button id="theme-toggle-btn" class="p-3 focusable rounded-full hover:bg-gray-700 transition-colors" aria-label="Toggle light/dark theme" aria-pressed="false"></button>
            </div>
            <p class="mt-6 text-gray-400">Session <span id="session-count" class="font-semibold text-white">1</span></p>
        </div>
    </div>
    
    <noscript>
        <div class="fixed inset-0 bg-red-900/90 flex items-center justify-center p-4" role="alert">
            <div class="text-white text-center">
                <h1 class="text-2xl font-bold mb-2">⚠️ JavaScript Required</h1>
                <p>Please enable JavaScript to use the Pomodoro Timer.</p>
            </div>
        </div>
    </noscript>
    
    <script>
        'use strict';
        
        document.addEventListener('DOMContentLoaded', () => {
            const CONFIG = {
                DURATIONS: { pomodoro: 1500, shortBreak: 300, longBreak: 900 },
                TIMER_UPDATE: 100
            };
            
            // DOM ELEMENTS
            const app = document.getElementById('app');
            const timerDisplay = document.getElementById('timer-display');
            const startPauseBtn = document.getElementById('start-pause-btn');
            const resetBtn = document.getElementById('reset-btn');
            const taskInput = document.getElementById('task-title');
            const sessionCount = document.getElementById('session-count');
            const progressRing = document.getElementById('progress-ring');
            const autoStartToggle = document.getElementById('auto-start-toggle');
            const autoStartDot = document.getElementById('auto-start-dot');
            const toggleBg = document.getElementById('toggle-bg');
            const soundBtn = document.getElementById('sound-toggle-btn');
            const themeBtn = document.getElementById('theme-toggle-btn');
            
            const modeButtons = {
                pomodoro: document.getElementById('pomodoro-btn'),
                shortBreak: document.getElementById('short-break-btn'),
                longBreak: document.getElementById('long-break-btn')
            };
            
            // STATE
            let state = {
                timerId: null,
                isRunning: false,
                mode: 'pomodoro',
                timeRemaining: 1500,
                totalDuration: 1500,
                pomodorosCompleted: 0,
                isSoundOn: true,
                isAutoStartOn: false,
                theme: localStorage.getItem('pomodoroTheme') || 'light'
            };
            
            // SOUND SETUP (Silent approach - no actual audio played)
            const playNotification = () => {
                if (state.isSoundOn && typeof navigator !== 'undefined' && 'vibrate' in navigator) {
                    try {
                        navigator.vibrate([200, 100, 200]);
                    } catch (e) {
                        console.debug('Vibration not supported');
                    }
                }
            };
            
            // PROGRESS RING
            const progressRingRadius = progressRing.r.baseVal.value;
            const progressRingCircumference = 2 * Math.PI * progressRingRadius;
            progressRing.style.strokeDasharray = `${progressRingCircumference} ${progressRingCircumference}`;
            
            function updateProgressRing() {
                const progress = (state.totalDuration - state.timeRemaining) / state.totalDuration;
                const offset = progressRingCircumference * (1 - progress);
                progressRing.style.strokeDashoffset = offset;
            }
            
            // DISPLAY FUNCTIONS
            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }
            
            function updateDisplay() {
                timerDisplay.textContent = formatTime(state.timeRemaining);
                document.title = `${formatTime(state.timeRemaining)} - ${taskInput.value || 'Pomodoro'}`;
                updateProgressRing();
            }
            
            function updateModeButtons() {
                Object.entries(modeButtons).forEach(([mode, btn]) => {
                    btn.classList.toggle('active', state.mode === mode);
                    btn.setAttribute('aria-selected', state.mode === mode);
                });
            }
            
            function setTheme(themeName) {
                state.theme = themeName;
                localStorage.setItem('pomodoroTheme', themeName);
                
                if (themeName === 'dark') {
                    app.classList.add('bg-gray-900');
                    themeBtn.innerHTML = '☀️';
                    themeBtn.setAttribute('aria-label', 'Switch to light theme');
                } else {
                    app.classList.remove('bg-gray-900');
                    themeBtn.innerHTML = '🌙';
                    themeBtn.setAttribute('aria-label', 'Switch to dark theme');
                }
            }
            
            // TIMER FUNCTIONS
            function startTimer() {
                if (state.isRunning) return;
                state.isRunning = true;
                startPauseBtn.textContent = 'PAUSE';
                startPauseBtn.setAttribute('aria-label', 'Pause timer');
                
                state.timerId = setInterval(() => {
                    if (state.timeRemaining > 0) {
                        state.timeRemaining--;
                        updateDisplay();
                    } else {
                        handleTimerComplete();
                    }
                }, CONFIG.TIMER_UPDATE);
            }
            
            function pauseTimer() {
                state.isRunning = false;
                clearInterval(state.timerId);
                startPauseBtn.textContent = 'RESUME';
                startPauseBtn.setAttribute('aria-label', 'Resume timer');
            }
            
            function resetTimer() {
                pauseTimer();
                state.timeRemaining = CONFIG.DURATIONS[state.mode];
                state.totalDuration = CONFIG.DURATIONS[state.mode];
                startPauseBtn.textContent = 'START';
                startPauseBtn.setAttribute('aria-label', 'Start timer');
                updateDisplay();
            }
            
            function switchMode(newMode) {
                if (state.isRunning) {
                    if (!confirm('Stop current timer and switch modes?')) return;
                    pauseTimer();
                }
                state.mode = newMode;
                state.timeRemaining = CONFIG.DURATIONS[newMode];
                state.totalDuration = CONFIG.DURATIONS[newMode];
                updateModeButtons();
                startPauseBtn.textContent = 'START';
                updateDisplay();
            }
            
            function handleTimerComplete() {
                pauseTimer();
                playNotification();
                
                if (state.mode === 'pomodoro') {
                    state.pomodorosCompleted++;
                    sessionCount.textContent = state.pomodorosCompleted;
                    alert(`✅ Pomodoro #${state.pomodorosCompleted} complete! Time for a break.`);
                    if (state.isAutoStartOn) switchMode('shortBreak');
                } else {
                    alert('✅ Break time over! Ready for another session?');
                    if (state.isAutoStartOn) switchMode('pomodoro');
                }
            }
            
            // EVENT LISTENERS
            startPauseBtn.addEventListener('click', () => {
                state.isRunning ? pauseTimer() : startTimer();
            });
            
            resetBtn.addEventListener('click', resetTimer);
            
            Object.entries(modeButtons).forEach(([mode, btn]) => {
                btn.addEventListener('click', () => switchMode(mode));
            });
            
            autoStartToggle.addEventListener('change', (e) => {
                state.isAutoStartOn = e.target.checked;
                toggleBg.classList.toggle('bg-indigo-600', state.isAutoStartOn);
                autoStartDot.style.transform = state.isAutoStartOn ? 'translateX(1.25rem)' : 'translateX(0)';
            });
            
            soundBtn.addEventListener('click', () => {
                state.isSoundOn = !state.isSoundOn;
                soundBtn.innerHTML = state.isSoundOn ? '🔔' : '🔇';
                soundBtn.setAttribute('aria-pressed', state.isSoundOn);
            });
            
            themeBtn.addEventListener('click', () => {
                setTheme(state.theme === 'light' ? 'dark' : 'light');
            });
            
            // INITIALIZE
            updateDisplay();
            updateModeButtons();
            setTheme(state.theme);
            soundBtn.innerHTML = '🔔';
        });
    </script>
</body>
</html>
