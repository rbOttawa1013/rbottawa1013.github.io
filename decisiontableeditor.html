<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Table Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}:focus-visible{outline:3px solid #2563eb;outline-offset:3px}td,th{vertical-align:top}</style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <header class="bg-slate-950 text-white"><div class="mx-auto max-w-7xl px-4 py-6"><p class="text-sm uppercase tracking-wide text-blue-200">Local-first rules tool</p><h1 class="text-3xl font-bold">Decision Table Editor</h1><p class="mt-2 max-w-4xl text-slate-200">Create, edit, test, import, and export decision tables. Data is saved in this browser; no Firebase configuration is required.</p></div></header>
  <main class="mx-auto grid max-w-7xl gap-6 p-4">
    <section class="rounded-2xl bg-white p-5 shadow" aria-labelledby="meta-title"><h2 id="meta-title" class="text-xl font-semibold">Table metadata</h2><div class="mt-4 grid gap-4 md:grid-cols-3"><label class="grid gap-1 font-medium">Table name<input id="tableName" class="rounded-lg border p-3" value="Age & Citizenship Eligibility Demo"></label><label class="grid gap-1 font-medium">Condition columns<input id="conditions" class="rounded-lg border p-3" value="Age, IsCitizen"></label><label class="grid gap-1 font-medium">Action columns<input id="actions" class="rounded-lg border p-3" value="Eligibility, Notes"></label></div><div class="mt-4 flex flex-wrap gap-2"><button id="rebuildBtn" class="rounded-lg bg-blue-700 px-4 py-2 font-bold text-white">Rebuild table</button><button id="addRuleBtn" class="rounded-lg bg-emerald-700 px-4 py-2 font-bold text-white">Add rule</button><button id="saveBtn" class="rounded-lg bg-slate-800 px-4 py-2 font-bold text-white">Save locally</button><button id="exportBtn" class="rounded-lg bg-purple-700 px-4 py-2 font-bold text-white">Export JSON</button><label class="rounded-lg bg-indigo-700 px-4 py-2 font-bold text-white cursor-pointer">Import JSON<input id="importFile" type="file" accept="application/json,.json" class="sr-only"></label></div></section>
    <section class="rounded-2xl bg-white p-5 shadow overflow-x-auto" aria-labelledby="editor-title"><h2 id="editor-title" class="text-xl font-semibold">Rules</h2><table class="mt-4 min-w-full border-collapse text-sm"><thead id="thead"></thead><tbody id="tbody"></tbody></table></section>
    <section class="grid gap-6 lg:grid-cols-2"><div class="rounded-2xl bg-white p-5 shadow"><h2 class="text-xl font-semibold">Test input</h2><div id="testInputs" class="mt-4 grid gap-3"></div><button id="testBtn" class="mt-4 rounded-lg bg-blue-700 px-4 py-2 font-bold text-white">Evaluate first matching rule</button><pre id="testResult" class="mt-4 whitespace-pre-wrap rounded-xl bg-slate-100 p-4"></pre></div><div class="rounded-2xl bg-white p-5 shadow"><h2 class="text-xl font-semibold">Generated JavaScript evaluator</h2><button id="copyCodeBtn" class="mt-4 rounded-lg bg-slate-800 px-4 py-2 font-bold text-white">Copy code</button><pre id="codeOut" class="mt-4 max-h-96 overflow-auto whitespace-pre-wrap rounded-xl bg-slate-950 p-4 text-slate-100"></pre></div></section>
  </main>
<script>
const STORAGE_KEY='rbottawa-decision-table-v2';
const $=id=>document.getElementById(id);let table={name:'Age & Citizenship Eligibility Demo',conditions:['Age','IsCitizen'],actions:['Eligibility','Notes'],rules:[{'Age':'Age >= 18','IsCitizen':'IsCitizen === true','Eligibility':'Eligible','Notes':'Standard eligibility'},{'Age':'Age < 18','IsCitizen':'IsCitizen === true','Eligibility':'Not Eligible','Notes':'Too young'},{'Age':'','IsCitizen':'IsCitizen === false','Eligibility':'Not Eligible','Notes':'Citizenship required'}]};
function load(){try{table=JSON.parse(localStorage.getItem(STORAGE_KEY))||table}catch{} $('tableName').value=table.name;$('conditions').value=table.conditions.join(', ');$('actions').value=table.actions.join(', ')}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(table));}
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function columns(){return [...table.conditions,...table.actions];}
function syncMeta(){table.name=$('tableName').value.trim()||'Untitled decision table';table.conditions=$('conditions').value.split(',').map(x=>x.trim()).filter(Boolean);table.actions=$('actions').value.split(',').map(x=>x.trim()).filter(Boolean);table.rules=table.rules.map(r=>Object.fromEntries(columns().map(c=>[c,r[c]||''])));}
function render(){syncMeta();$('thead').innerHTML='<tr class="bg-slate-100">'+columns().map(c=>`<th class="border p-2 text-left">${esc(c)}</th>`).join('')+'<th class="border p-2">Actions</th></tr>';$('tbody').innerHTML=table.rules.map((rule,i)=>'<tr>'+columns().map(c=>`<td class="border p-2"><textarea class="w-56 rounded border p-2" data-r="${i}" data-c="${esc(c)}">${esc(rule[c]||'')}</textarea></td>`).join('')+`<td class="border p-2"><button class="rounded bg-red-700 px-3 py-2 font-bold text-white" data-del="${i}">Delete</button></td></tr>`).join('');document.querySelectorAll('textarea[data-r]').forEach(t=>t.addEventListener('input',()=>{table.rules[+t.dataset.r][t.dataset.c]=t.value;renderCode();save();}));document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{table.rules.splice(+b.dataset.del,1);render();save();}));renderTestInputs();renderCode();}
function renderTestInputs(){$('testInputs').innerHTML=table.conditions.map(c=>`<label class="grid gap-1 font-medium">${esc(c)}<input id="test_${esc(c)}" class="rounded-lg border p-3" placeholder="true, false, 18, text"></label>`).join('');}
function valueOf(v){if(v==='true')return true;if(v==='false')return false;if(v!==''&&!Number.isNaN(Number(v)))return Number(v);return v;}
function evaluate(){const ctx=Object.fromEntries(table.conditions.map(c=>[c,valueOf($('test_'+c).value.trim())]));for(const rule of table.rules){let ok=true;for(const c of table.conditions){const expr=String(rule[c]||'').trim();if(expr){try{ok=ok&&Function(...Object.keys(ctx),`return (${expr});`)(...Object.values(ctx));}catch(e){ok=false;}}}if(ok){$('testResult').textContent=JSON.stringify(Object.fromEntries(table.actions.map(a=>[a,rule[a]||''])),null,2);return;}}$('testResult').textContent='No matching rule.';}
function renderCode(){const safe=JSON.stringify(table,null,2);$('codeOut').textContent=`function evaluateDecision(input){\n  const table = ${safe};\n  for (const rule of table.rules) {\n    let ok = true;\n    for (const condition of table.conditions) {\n      const expr = String(rule[condition] || '').trim();\n      if (expr) ok = ok && Function(...Object.keys(input), 'return (' + expr + ');')(...Object.values(input));\n    }\n    if (ok) return Object.fromEntries(table.actions.map(a => [a, rule[a] || '']));\n  }\n  return null;\n}`;}
$('rebuildBtn').onclick=()=>{render();save();};$('addRuleBtn').onclick=()=>{syncMeta();table.rules.push(Object.fromEntries(columns().map(c=>[c,''])));render();save();};$('saveBtn').onclick=()=>{syncMeta();save();alert('Saved locally.');};$('testBtn').onclick=evaluate;$('copyCodeBtn').onclick=()=>navigator.clipboard.writeText($('codeOut').textContent);$('exportBtn').onclick=()=>{syncMeta();const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(table,null,2)],{type:'application/json'}));a.download='decision-table.json';a.click();URL.revokeObjectURL(a.href);};$('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{table=JSON.parse(r.result);save();load();render();}catch{alert('Invalid JSON.')}};r.readAsText(f);e.target.value='';};
load();render();
</script>
</body>
</html>
