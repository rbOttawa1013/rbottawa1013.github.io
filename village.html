<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WWI French Village Simulation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    body { margin: 0; min-height: 100vh; overflow: hidden; background: #0f172a; color: white; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    canvas { display: block; }
    :focus-visible { outline: 3px solid #93c5fd; outline-offset: 3px; }
    .panel { position: absolute; z-index: 5; background: rgba(15, 23, 42, .82); backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.24); border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
    #info { top: 1rem; left: 50%; transform: translateX(-50%); width: min(92vw, 760px); padding: .9rem 1rem; text-align: center; }
    #controls { left: 1rem; top: 1rem; width: min(88vw, 270px); padding: 1rem; display: grid; gap: .65rem; }
    #controls h1 { margin: 0; font-size: 1.05rem; }
    #controls label { display: grid; gap: .25rem; font-size: .85rem; color: #dbeafe; }
    #controls button, #controls select, #controls input { border-radius: .55rem; border: 1px solid rgba(255,255,255,.3); padding: .55rem .65rem; font: inherit; }
    #controls button { background: #2563eb; color: white; font-weight: 700; cursor: pointer; }
    #controls button:hover { background: #1d4ed8; }
    #legend { right: 1rem; bottom: 1rem; padding: .8rem 1rem; font-size: .88rem; max-width: 300px; }
    @media (max-width: 760px) { #controls { position: static; width: auto; margin: .75rem; } #info { display: none; } #legend { left: 1rem; right: 1rem; max-width: none; } }
  </style>
</head>
<body>
  <aside id="controls" class="panel" aria-labelledby="app-title">
    <h1 id="app-title">WWI French Village</h1>
    <label>Time of day
      <select id="timeSelect">
        <option value="dawn">Dawn</option>
        <option value="day" selected>Day</option>
        <option value="evening">Evening</option>
        <option value="night">Night</option>
      </select>
    </label>
    <label>Buildings <input id="buildingCount" type="range" min="3" max="28" value="12" /></label>
    <label>Trees <input id="treeCount" type="range" min="10" max="120" value="55" /></label>
    <label>Animals <input id="animalCount" type="range" min="0" max="20" value="8" /></label>
    <button id="regenerateBtn" type="button">Regenerate village</button>
  </aside>

  <div id="info" class="panel" role="status">Orbit with mouse or touch. Scroll to zoom. This educational scene is a stylized, non-combat village environment.</div>
  <div id="legend" class="panel">Scene elements: road, houses, church, trees, animals, moon/sun, and basic day-night lighting.</div>

  <script>
    let scene, camera, renderer, controls, sunLight, ambientLight;
    const objects = [];
    const rand = (min, max) => min + Math.random() * (max - min);

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(70, 52, 85);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.enableDamping = true;

      ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
      scene.add(ambientLight);
      sunLight = new THREE.DirectionalLight(0xffffff, 1.05);
      sunLight.position.set(40, 80, 30);
      sunLight.castShadow = true;
      scene.add(sunLight);

      buildWorld();
      applyTime('day');
      animate();
    }

    function clearObjects() { while (objects.length) { const obj = objects.pop(); scene.remove(obj); } }
    function add(obj) { objects.push(obj); scene.add(obj); return obj; }

    function buildWorld() {
      clearObjects();
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(260, 260), new THREE.MeshLambertMaterial({ color: 0x4d7c3f }));
      ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; add(ground);

      const road = new THREE.Mesh(new THREE.PlaneGeometry(18, 240), new THREE.MeshLambertMaterial({ color: 0x9ca3af }));
      road.rotation.x = -Math.PI / 2; road.position.y = 0.03; add(road);
      const crossRoad = new THREE.Mesh(new THREE.PlaneGeometry(190, 12), new THREE.MeshLambertMaterial({ color: 0x9ca3af }));
      crossRoad.rotation.x = -Math.PI / 2; crossRoad.position.y = 0.04; add(crossRoad);

      const buildings = Number(document.getElementById('buildingCount').value);
      for (let i = 0; i < buildings; i++) createHouse(i);
      createChurch();

      const trees = Number(document.getElementById('treeCount').value);
      for (let i = 0; i < trees; i++) createTree(rand(-120, 120), rand(-120, 120));

      const animals = Number(document.getElementById('animalCount').value);
      for (let i = 0; i < animals; i++) createAnimal(rand(-95, 95), rand(-95, 95));
    }

    function createHouse(i) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(rand(10, 16), rand(7, 12), rand(9, 14)), new THREE.MeshLambertMaterial({ color: [0xc7a17a,0xb08968,0xd6ccc2][i % 3] }));
      body.position.y = body.geometry.parameters.height / 2; body.castShadow = true; body.receiveShadow = true; group.add(body);
      const roof = new THREE.Mesh(new THREE.ConeGeometry(Math.max(body.geometry.parameters.width, body.geometry.parameters.depth) * .8, 6, 4), new THREE.MeshLambertMaterial({ color: 0x7f1d1d }));
      roof.rotation.y = Math.PI / 4; roof.position.y = body.geometry.parameters.height + 3; roof.castShadow = true; group.add(roof);
      const side = i % 2 === 0 ? -1 : 1;
      group.position.set(side * rand(22, 80), 0, -85 + i * (170 / Math.max(1, Number(document.getElementById('buildingCount').value))));
      add(group);
    }

    function createChurch() {
      const group = new THREE.Group();
      const nave = new THREE.Mesh(new THREE.BoxGeometry(18, 14, 28), new THREE.MeshLambertMaterial({ color: 0xd1d5db }));
      nave.position.y = 7; nave.castShadow = true; group.add(nave);
      const tower = new THREE.Mesh(new THREE.BoxGeometry(10, 28, 10), new THREE.MeshLambertMaterial({ color: 0xcbd5e1 }));
      tower.position.set(0, 14, -18); tower.castShadow = true; group.add(tower);
      const spire = new THREE.Mesh(new THREE.ConeGeometry(7, 14, 4), new THREE.MeshLambertMaterial({ color: 0x334155 }));
      spire.rotation.y = Math.PI/4; spire.position.set(0, 35, -18); spire.castShadow = true; group.add(spire);
      group.position.set(0, 0, 25); add(group);
    }

    function createTree(x, z) {
      if (Math.abs(x) < 14 || Math.abs(z) < 10) return;
      const group = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.8, 1.1, 6), new THREE.MeshLambertMaterial({ color: 0x7c2d12 }));
      trunk.position.y = 3; trunk.castShadow = true; group.add(trunk);
      const crown = new THREE.Mesh(new THREE.ConeGeometry(rand(4, 7), rand(9, 14), 8), new THREE.MeshLambertMaterial({ color: 0x14532d }));
      crown.position.y = 10; crown.castShadow = true; group.add(crown);
      group.position.set(x, 0, z); add(group);
    }

    function createAnimal(x, z) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 2), new THREE.MeshLambertMaterial({ color: 0xf8fafc }));
      body.position.y = 1.8; body.castShadow = true; group.add(body);
      const head = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 1.4), new THREE.MeshLambertMaterial({ color: 0xf1f5f9 }));
      head.position.set(2.5, 2.1, 0); head.castShadow = true; group.add(head);
      group.position.set(x, 0, z); group.rotation.y = rand(0, Math.PI * 2); add(group);
    }

    function applyTime(mode) {
      const presets = {
        dawn: { bg: 0xfbbf24, fog: 0xfde68a, ambient: .55, sun: .8, pos: [60,35,15] },
        day: { bg: 0x87ceeb, fog: 0xdbeafe, ambient: .55, sun: 1.1, pos: [45,90,40] },
        evening: { bg: 0xfb923c, fog: 0xfed7aa, ambient: .45, sun: .65, pos: [-60,30,15] },
        night: { bg: 0x020617, fog: 0x111827, ambient: .18, sun: .25, pos: [-25,55,-40] }
      }[mode];
      scene.background = new THREE.Color(presets.bg);
      scene.fog = new THREE.Fog(presets.fog, 120, 260);
      ambientLight.intensity = presets.ambient;
      sunLight.intensity = presets.sun;
      sunLight.position.set(...presets.pos);
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    document.getElementById('timeSelect').addEventListener('change', e => applyTime(e.target.value));
    document.getElementById('regenerateBtn').addEventListener('click', buildWorld);
    init();
  </script>
</body>
</html>
