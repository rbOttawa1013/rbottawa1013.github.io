<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Version-control note: 2026-06-15 v2.0.0 QA remediation.
       Fixes: removes leading pre-doctype whitespace, removes external CDN dependencies, replaces unsafe innerHTML rendering,
       adds explicit button types, centralizes game reset, stabilizes language switching, fixes selection styling patterns,
       improves keyboard/ARIA board accessibility, clarifies rules, and uses safe DOM construction throughout. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats Adventure Canada</title>
  <style>
    :root {
      --red: #c8102e;
      --dark: #1f2937;
      --light: #f8fafc;
      --panel: #ffffff;
      --line: #d1d5db;
      --blue: #2563eb;
      --green: #15803d;
      --yellow: #facc15;
      --orange: #f97316;
      --purple: #7c3aed;
      --shadow: 0 8px 24px rgba(15, 23, 42, .18);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--dark);
      background: linear-gradient(135deg, #fff5f5 0%, #f8fafc 45%, #eef2ff 100%);
    }
    header {
      background: var(--red);
      color: white;
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }
    h1 { margin: 0; font-size: clamp(1.45rem, 3vw, 2.35rem); }
    .subtitle { margin: 6px 0 0; font-size: .95rem; opacity: .95; }
    main {
      width: min(1180px, 96vw);
      margin: 18px auto 32px;
      display: grid;
      gap: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .topbar, .controls, .setup-grid, .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .setup-grid { align-items: end; }
    label { font-weight: 700; display: block; margin-bottom: 4px; }
    input, select, button {
      font: inherit;
    }
    input, select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      min-height: 42px;
      background: white;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      min-height: 42px;
      cursor: pointer;
      background: var(--dark);
      color: white;
      font-weight: 700;
    }
    button.secondary { background: #e5e7eb; color: var(--dark); }
    button.primary { background: var(--blue); }
    button.success { background: var(--green); }
    button.warning { background: var(--orange); }
    button:disabled { cursor: not-allowed; opacity: .55; }
    button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
      outline: 3px solid #60a5fa;
      outline-offset: 2px;
    }
    .hidden { display: none !important; }
    .muted { color: #64748b; }
    .small { font-size: .88rem; }
    .language-toggle { margin-left: auto; }
    .board-wrap { overflow-x: auto; padding-bottom: 4px; }
    .board {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      min-width: 760px;
    }
    .cell {
      position: relative;
      min-height: 112px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 10px;
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .cell[aria-current="true"] {
      border-color: var(--red);
      box-shadow: 0 0 0 4px rgba(200, 16, 46, .18);
      transform: translateY(-2px);
    }
    .cell-title { font-weight: 800; margin: 0 0 4px; }
    .cell-year { font-size: .8rem; color: #64748b; }
    .cell-emoji { font-size: 1.8rem; display: block; }
    .pieces { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .piece {
      width: 24px;
      height: 24px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      font-size: .75rem;
      font-weight: 800;
    }
    .player-0 { background: var(--blue); }
    .player-1 { background: var(--green); }
    .player-2 { background: var(--orange); }
    .player-3 { background: var(--purple); }
    .challenge-title { margin-top: 0; }
    .answer-grid { display: grid; gap: 10px; margin-top: 12px; }
    .answer-option {
      width: 100%;
      border-radius: 12px;
      text-align: left;
      background: #f1f5f9;
      color: var(--dark);
      border: 2px solid transparent;
    }
    .answer-option.selected, .answer-option:hover { border-color: var(--blue); background: #dbeafe; }
    .answer-option.correct { background: #dcfce7; border-color: var(--green); }
    .answer-option.incorrect { background: #fee2e2; border-color: var(--red); }
    .status-card {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }
    .stat {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }
    .stat strong { display: block; font-size: 1.2rem; }
    .notice {
      border-left: 5px solid var(--blue);
      background: #eff6ff;
      padding: 12px;
      border-radius: 10px;
    }
    dialog {
      border: 0;
      border-radius: 16px;
      width: min(720px, 94vw);
      padding: 0;
      box-shadow: var(--shadow);
    }
    dialog::backdrop { background: rgba(15, 23, 42, .45); }
    .dialog-body { padding: 18px; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    @media (max-width: 760px) {
      .language-toggle { margin-left: 0; }
      .board { grid-template-columns: repeat(4, minmax(110px, 1fr)); min-width: 520px; }
      .cell { min-height: 104px; }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="appTitle">Stats Adventure Canada</h1>
    <p id="appSubtitle" class="subtitle">A board-game journey through Canadian statistics milestones.</p>
  </header>

  <main>
    <section class="panel topbar" aria-label="Game options">
      <button id="rulesBtn" class="secondary" type="button">Rules</button>
      <button id="restartBtn" class="secondary" type="button">Restart</button>
      <div class="language-toggle">
        <label for="languageSelect" id="languageLabel">Language</label>
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="fr">Français</option>
        </select>
      </div>
    </section>

    <section id="setupPanel" class="panel" aria-labelledby="setupHeading">
      <h2 id="setupHeading">Set up players</h2>
      <div class="setup-grid">
        <div>
          <label id="playerCountLabel" for="playerCount">Players</label>
          <select id="playerCount">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>
        <div id="playerInputs" class="setup-grid" aria-live="polite"></div>
        <button id="startBtn" class="primary" type="button">Start Game</button>
      </div>
      <p id="setupHint" class="muted small">Enter player names or use the defaults.</p>
    </section>

    <section id="gamePanel" class="hidden" aria-label="Statistics game board">
      <div class="panel status-card" aria-live="polite">
        <div class="stat"><span id="turnLabel">Current turn</span><strong id="turnValue">—</strong></div>
        <div class="stat"><span id="positionLabel">Position</span><strong id="positionValue">—</strong></div>
        <div class="stat"><span id="accuracyLabel">Accuracy</span><strong id="accuracyValue">0%</strong></div>
        <div class="stat"><span id="diceLabel">Dice</span><strong id="diceValue">—</strong></div>
      </div>

      <div class="panel controls">
        <button id="rollBtn" class="success" type="button">Roll Dice</button>
        <button id="skipBtn" class="warning" type="button">Skip Challenge</button>
        <span id="liveStatus" class="notice" role="status" aria-live="polite">Ready.</span>
      </div>

      <section class="panel board-wrap">
        <h2 id="boardHeading">Board</h2>
        <p id="boardSummary" class="muted small" aria-live="polite"></p>
        <div id="board" class="board" role="grid" aria-label="Statistics Canada timeline board"></div>
      </section>

      <section id="challengePanel" class="panel hidden" aria-labelledby="challengeHeading">
        <h2 id="challengeHeading" class="challenge-title">Challenge</h2>
        <p id="challengeMeta" class="muted"></p>
        <p id="challengeQuestion"></p>
        <div id="answerOptions" class="answer-grid"></div>
        <div class="controls">
          <button id="submitAnswerBtn" class="primary" type="button">Submit Answer</button>
          <button id="continueBtn" class="success hidden" type="button">Continue</button>
        </div>
        <p id="feedback" class="notice hidden" role="status" aria-live="polite"></p>
      </section>
    </section>
  </main>

  <dialog id="rulesDialog">
    <div class="dialog-body">
      <h2 id="rulesTitle">Rules</h2>
      <div id="rulesContent"></div>
      <div class="controls"><button id="closeRulesBtn" type="button">Close</button></div>
    </div>
  </dialog>

  <script>
    'use strict';

    const ui = {
      en: {
        title: 'Stats Adventure Canada',
        subtitle: 'A board-game journey through Canadian statistics milestones.',
        rules: 'Rules', restart: 'Restart', language: 'Language', setup: 'Set up players', players: 'Players',
        start: 'Start Game', hint: 'Enter player names or use the defaults.', player: 'Player', currentTurn: 'Current turn',
        position: 'Position', accuracy: 'Accuracy', dice: 'Dice', roll: 'Roll Dice', skip: 'Skip Challenge', ready: 'Ready.',
        board: 'Board', challenge: 'Challenge', submit: 'Submit Answer', cont: 'Continue', close: 'Close',
        rulesTitle: 'Rules',
        rulesHtml: [
          'Roll the die and move along the statistics timeline.',
          'When you land on a square, answer the challenge to complete your turn.',
          'The final square requires a correct or completed challenge before the winner is declared.',
          'Use Tab to move through the board. The current square is also announced below the board heading.'
        ],
        correct: 'Correct.', incorrect: 'Not quite.', selectedNeeded: 'Choose an answer first.', winner: 'wins the game!',
        skipped: 'Challenge skipped.', rolled: 'rolled', onSquare: 'on', defaultName: 'Player', noChallenge: 'No challenge on this square.',
        finalChallenge: 'Final challenge: complete this to win.'
      },
      fr: {
        title: 'Aventure statistique Canada',
        subtitle: 'Un jeu de parcours sur les jalons des statistiques canadiennes.',
        rules: 'Règles', restart: 'Recommencer', language: 'Langue', setup: 'Configurer les joueurs', players: 'Joueurs',
        start: 'Démarrer', hint: 'Entrez les noms des joueurs ou utilisez les valeurs par défaut.', player: 'Joueur', currentTurn: 'Tour actuel',
        position: 'Position', accuracy: 'Exactitude', dice: 'Dé', roll: 'Lancer le dé', skip: 'Sauter le défi', ready: 'Prêt.',
        board: 'Plateau', challenge: 'Défi', submit: 'Soumettre', cont: 'Continuer', close: 'Fermer',
        rulesTitle: 'Règles',
        rulesHtml: [
          'Lancez le dé et avancez sur la ligne du temps statistique.',
          'Lorsque vous arrivez sur une case, répondez au défi pour terminer votre tour.',
          'La dernière case exige un défi réussi ou complété avant de déclarer le gagnant.',
          'Utilisez Tab pour parcourir le plateau. La case actuelle est aussi annoncée sous le titre du plateau.'
        ],
        correct: 'Bonne réponse.', incorrect: 'Pas tout à fait.', selectedNeeded: 'Choisissez une réponse d’abord.', winner: 'gagne la partie!',
        skipped: 'Défi sauté.', rolled: 'a lancé', onSquare: 'sur', defaultName: 'Joueur', noChallenge: 'Aucun défi sur cette case.',
        finalChallenge: 'Défi final : terminez-le pour gagner.'
      }
    };

    const milestones = [
      { year: '1666', emoji: '📜', en: 'First Census', fr: 'Premier recensement', q: [
        { en: 'What was an early purpose of a census?', fr: 'Quel était un objectif précoce du recensement?', a: ['Count people', 'Predict weather', 'Draw maps'], af: ['Compter les personnes', 'Prévoir la météo', 'Dessiner des cartes'], c: 0 }
      ] },
      { year: '1871', emoji: '🏛️', en: 'National Census', fr: 'Recensement national', q: [
        { en: 'How often is Canada’s main census conducted?', fr: 'À quelle fréquence le recensement principal du Canada est-il mené?', a: ['Every 5 years', 'Every year', 'Every 20 years'], af: ['Tous les 5 ans', 'Chaque année', 'Tous les 20 ans'], c: 0 }
      ] },
      { year: '1918', emoji: '📊', en: 'Dominion Bureau', fr: 'Bureau fédéral', q: [
        { en: 'Statistics agencies help governments make decisions using what?', fr: 'Les organismes statistiques aident les gouvernements à décider avec quoi?', a: ['Evidence', 'Rumours', 'Coin flips'], af: ['Des données probantes', 'Des rumeurs', 'Des tirages au sort'], c: 0 }
      ] },
      { year: '1941', emoji: '🏠', en: 'Housing Data', fr: 'Données logement', q: [
        { en: 'Which topic is often measured with population statistics?', fr: 'Quel sujet est souvent mesuré par les statistiques démographiques?', a: ['Housing', 'Horoscopes', 'Movie endings'], af: ['Le logement', 'Les horoscopes', 'Les fins de films'], c: 0 }
      ] },
      { year: '1971', emoji: '💼', en: 'Labour Force', fr: 'Population active', q: [
        { en: 'The unemployment rate relates to which subject?', fr: 'Le taux de chômage se rapporte à quel sujet?', a: ['Labour market', 'Astronomy', 'Cooking'], af: ['Marché du travail', 'Astronomie', 'Cuisine'], c: 0 }
      ] },
      { year: '1986', emoji: '💻', en: 'Digital Processing', fr: 'Traitement numérique', q: [
        { en: 'Why do computers help statistics?', fr: 'Pourquoi les ordinateurs aident-ils les statistiques?', a: ['They process large data quickly', 'They remove the need for quality checks', 'They guess everything'], af: ['Ils traitent rapidement de grands ensembles de données', 'Ils éliminent les contrôles de qualité', 'Ils devinent tout'], c: 0 }
      ] },
      { year: '2001', emoji: '🌐', en: 'Online Access', fr: 'Accès en ligne', q: [
        { en: 'Open data improves which public value?', fr: 'Les données ouvertes améliorent quelle valeur publique?', a: ['Transparency', 'Secrecy', 'Confusion'], af: ['Transparence', 'Secret', 'Confusion'], c: 0 }
      ] },
      { year: '2011', emoji: '🧮', en: 'National Household Survey', fr: 'Enquête nationale auprès des ménages', q: [
        { en: 'A survey sample should be designed to reduce what?', fr: 'Un échantillon d’enquête doit être conçu pour réduire quoi?', a: ['Bias', 'Clarity', 'Documentation'], af: ['Le biais', 'La clarté', 'La documentation'], c: 0 }
      ] },
      { year: '2016', emoji: '📱', en: 'Digital Census', fr: 'Recensement numérique', q: [
        { en: 'A good online questionnaire should be:', fr: 'Un bon questionnaire en ligne devrait être :', a: ['Accessible and secure', 'Hard to read', 'Only visual'], af: ['Accessible et sécurisé', 'Difficile à lire', 'Seulement visuel'], c: 0 }
      ] },
      { year: '2021', emoji: '🧭', en: 'Pandemic-Era Data', fr: 'Données en pandémie', q: [
        { en: 'Timely statistics are important during a crisis because they support:', fr: 'Les statistiques actuelles sont importantes en crise parce qu’elles soutiennent :', a: ['Rapid evidence-based decisions', 'Slower communication', 'Less planning'], af: ['Des décisions rapides fondées sur des données probantes', 'Une communication plus lente', 'Moins de planification'], c: 0 }
      ] },
      { year: '2026', emoji: '🤖', en: 'AI and Data Quality', fr: 'IA et qualité des données', q: [
        { en: 'Before using AI with data, what should be checked?', fr: 'Avant d’utiliser l’IA avec des données, que faut-il vérifier?', a: ['Quality, privacy, and bias', 'Only colour', 'Nothing'], af: ['Qualité, confidentialité et biais', 'Seulement la couleur', 'Rien'], c: 0 }
      ] },
      { year: 'Finish', emoji: '🏁', en: 'Evidence Champion', fr: 'Champion des données', q: [
        { en: 'What is the best use of official statistics?', fr: 'Quelle est la meilleure utilisation des statistiques officielles?', a: ['Inform decisions and public understanding', 'Hide uncertainty', 'Replace judgment entirely'], af: ['Éclairer les décisions et la compréhension publique', 'Cacher l’incertitude', 'Remplacer entièrement le jugement'], c: 0 }
      ] }
    ];

    const dom = Object.fromEntries([
      'appTitle','appSubtitle','rulesBtn','restartBtn','languageSelect','languageLabel','setupPanel','setupHeading','playerCountLabel','playerCount','playerInputs','startBtn','setupHint','gamePanel','turnLabel','turnValue','positionLabel','positionValue','accuracyLabel','accuracyValue','diceLabel','diceValue','rollBtn','skipBtn','liveStatus','boardHeading','boardSummary','board','challengePanel','challengeHeading','challengeMeta','challengeQuestion','answerOptions','submitAnswerBtn','continueBtn','feedback','rulesDialog','rulesTitle','rulesContent','closeRulesBtn'
    ].map(id => [id, document.getElementById(id)]));

    const state = {
      lang: 'en',
      started: false,
      players: [],
      currentPlayer: 0,
      selectedAnswer: null,
      activeChallenge: null,
      awaitingChallenge: false,
      gameOver: false,
      dice: null,
      totalAnswers: 0,
      correctAnswers: 0
    };

    function t(key) { return ui[state.lang][key]; }

    function createEl(tag, options = {}, children = []) {
      const node = document.createElement(tag);
      Object.entries(options).forEach(([key, value]) => {
        if (key === 'className') node.className = value;
        else if (key === 'text') node.textContent = value;
        else if (key === 'dataset') Object.assign(node.dataset, value);
        else if (key.startsWith('aria')) node.setAttribute(key.replace(/[A-Z]/g, m => '-' + m.toLowerCase()), value);
        else node.setAttribute(key, value);
      });
      children.forEach(child => node.append(child));
      return node;
    }

    function resetGameState() {
      state.started = false;
      state.players = [];
      state.currentPlayer = 0;
      state.selectedAnswer = null;
      state.activeChallenge = null;
      state.awaitingChallenge = false;
      state.gameOver = false;
      state.dice = null;
      state.totalAnswers = 0;
      state.correctAnswers = 0;
    }

    function makePlayerInputs() {
      dom.playerInputs.replaceChildren();
      const count = Number(dom.playerCount.value);
      for (let i = 0; i < count; i++) {
        const wrap = createEl('div');
        const label = createEl('label', { for: `playerName${i}`, text: `${t('player')} ${i + 1}` });
        const input = createEl('input', { id: `playerName${i}`, type: 'text', maxlength: '30', value: `${t('defaultName')} ${i + 1}` });
        wrap.append(label, input);
        dom.playerInputs.appendChild(wrap);
      }
    }

    function applyLanguage() {
      document.documentElement.lang = state.lang;
      dom.appTitle.textContent = t('title');
      dom.appSubtitle.textContent = t('subtitle');
      dom.rulesBtn.textContent = t('rules');
      dom.restartBtn.textContent = t('restart');
      dom.languageLabel.textContent = t('language');
      dom.setupHeading.textContent = t('setup');
      dom.playerCountLabel.textContent = t('players');
      dom.startBtn.textContent = t('start');
      dom.setupHint.textContent = t('hint');
      dom.turnLabel.textContent = t('currentTurn');
      dom.positionLabel.textContent = t('position');
      dom.accuracyLabel.textContent = t('accuracy');
      dom.diceLabel.textContent = t('dice');
      dom.rollBtn.textContent = t('roll');
      dom.skipBtn.textContent = t('skip');
      dom.boardHeading.textContent = t('board');
      dom.challengeHeading.textContent = t('challenge');
      dom.submitAnswerBtn.textContent = t('submit');
      dom.continueBtn.textContent = t('cont');
      dom.rulesTitle.textContent = t('rulesTitle');
      dom.closeRulesBtn.textContent = t('close');
      renderRules();
      if (!state.started) makePlayerInputs();
      renderAll();
    }

    function renderRules() {
      const list = createEl('ul');
      t('rulesHtml').forEach(rule => list.appendChild(createEl('li', { text: rule })));
      dom.rulesContent.replaceChildren(list);
    }

    function startGame() {
      resetGameState();
      const count = Number(dom.playerCount.value);
      for (let i = 0; i < count; i++) {
        const input = document.getElementById(`playerName${i}`);
        const safeName = (input?.value || '').trim() || `${t('defaultName')} ${i + 1}`;
        state.players.push({ name: safeName, position: 0, completed: new Set(), colourClass: `player-${i}` });
      }
      state.started = true;
      dom.setupPanel.classList.add('hidden');
      dom.gamePanel.classList.remove('hidden');
      dom.liveStatus.textContent = t('ready');
      renderAll();
    }

    function renderAll() {
      renderStats();
      renderBoard();
      renderChallenge();
      updateControls();
    }

    function renderStats() {
      if (!state.started || !state.players.length) {
        dom.turnValue.textContent = '—';
        dom.positionValue.textContent = '—';
        dom.accuracyValue.textContent = '0%';
        dom.diceValue.textContent = '—';
        return;
      }
      const player = state.players[state.currentPlayer];
      const cell = milestones[player.position];
      dom.turnValue.textContent = player.name;
      dom.positionValue.textContent = `${player.position + 1}/${milestones.length} — ${cell[state.lang]}`;
      dom.accuracyValue.textContent = state.totalAnswers ? `${Math.round((state.correctAnswers / state.totalAnswers) * 100)}%` : '0%';
      dom.diceValue.textContent = state.dice ? String(state.dice) : '—';
      dom.boardSummary.textContent = `${player.name} ${t('onSquare')} ${cell.year}: ${cell[state.lang]}.`;
    }

    function renderBoard() {
      dom.board.replaceChildren();
      milestones.forEach((cell, index) => {
        const active = state.players.some(player => player.position === index);
        const tile = createEl('div', {
          className: 'cell', role: 'gridcell', tabindex: '0', ariaCurrent: active ? 'true' : 'false',
          ariaLabel: `${index + 1}. ${cell.year} ${cell[state.lang]}`
        });
        tile.append(
          createEl('span', { className: 'cell-emoji', text: cell.emoji }),
          createEl('p', { className: 'cell-title', text: cell[state.lang] }),
          createEl('span', { className: 'cell-year', text: cell.year })
        );
        const pieces = createEl('div', { className: 'pieces', ariaLabel: 'Players on this square' });
        state.players.forEach((player, playerIndex) => {
          if (player.position === index) pieces.appendChild(createEl('span', { className: `piece ${player.colourClass}`, text: String(playerIndex + 1), title: player.name }));
        });
        tile.appendChild(pieces);
        tile.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            dom.liveStatus.textContent = `${cell.year}: ${cell[state.lang]}`;
          }
        });
        dom.board.appendChild(tile);
      });
    }

    function currentPlayer() { return state.players[state.currentPlayer]; }

    function rollDice() {
      if (state.awaitingChallenge || state.gameOver) return;
      const player = currentPlayer();
      state.dice = Math.floor(Math.random() * 6) + 1;
      player.position = Math.min(player.position + state.dice, milestones.length - 1);
      const cell = milestones[player.position];
      dom.liveStatus.textContent = `${player.name} ${t('rolled')} ${state.dice}; ${t('onSquare')} ${cell[state.lang]}.`;
      presentChallenge();
      renderAll();
    }

    function presentChallenge() {
      const player = currentPlayer();
      const cell = milestones[player.position];
      const challenge = cell.q[0];
      state.activeChallenge = { cell, challenge };
      state.awaitingChallenge = true;
      state.selectedAnswer = null;
      if (player.position === milestones.length - 1) dom.liveStatus.textContent = t('finalChallenge');
    }

    function renderChallenge() {
      dom.answerOptions.replaceChildren();
      dom.feedback.classList.add('hidden');
      dom.continueBtn.classList.add('hidden');
      dom.submitAnswerBtn.disabled = true;

      if (!state.awaitingChallenge || !state.activeChallenge) {
        dom.challengePanel.classList.add('hidden');
        return;
      }

      const { cell, challenge } = state.activeChallenge;
      const answers = state.lang === 'fr' ? challenge.af : challenge.a;
      dom.challengePanel.classList.remove('hidden');
      dom.challengeMeta.textContent = `${cell.emoji} ${cell.year} — ${cell[state.lang]}`;
      dom.challengeQuestion.textContent = challenge[state.lang];

      answers.forEach((answerText, index) => {
        const button = createEl('button', { type: 'button', className: 'answer-option', text: answerText, ariaPressed: 'false' });
        button.addEventListener('click', () => selectAnswer(index));
        dom.answerOptions.appendChild(button);
      });
    }

    function selectAnswer(index) {
      state.selectedAnswer = index;
      [...dom.answerOptions.children].forEach((button, buttonIndex) => {
        button.classList.toggle('selected', buttonIndex === index);
        button.setAttribute('aria-pressed', buttonIndex === index ? 'true' : 'false');
      });
      dom.submitAnswerBtn.disabled = false;
    }

    function submitAnswer() {
      if (!state.activeChallenge) return;
      if (state.selectedAnswer === null) {
        dom.feedback.textContent = t('selectedNeeded');
        dom.feedback.classList.remove('hidden');
        return;
      }
      const { challenge } = state.activeChallenge;
      const correct = state.selectedAnswer === challenge.c;
      state.totalAnswers += 1;
      if (correct) state.correctAnswers += 1;
      [...dom.answerOptions.children].forEach((button, index) => {
        button.disabled = true;
        if (index === challenge.c) button.classList.add('correct');
        else if (index === state.selectedAnswer) button.classList.add('incorrect');
      });
      dom.feedback.textContent = correct ? t('correct') : t('incorrect');
      dom.feedback.classList.remove('hidden');
      dom.submitAnswerBtn.disabled = true;
      dom.continueBtn.classList.remove('hidden');
      renderStats();
    }

    function completeTurn() {
      const player = currentPlayer();
      player.completed.add(player.position);
      state.awaitingChallenge = false;
      state.activeChallenge = null;
      state.selectedAnswer = null;

      if (player.position === milestones.length - 1) {
        state.gameOver = true;
        dom.liveStatus.textContent = `${player.name} ${t('winner')}`;
      } else {
        state.currentPlayer = (state.currentPlayer + 1) % state.players.length;
        dom.liveStatus.textContent = t('ready');
      }
      renderAll();
    }

    function skipChallenge() {
      if (!state.awaitingChallenge) return;
      dom.liveStatus.textContent = t('skipped');
      completeTurn();
    }

    function updateControls() {
      const active = state.started && !state.gameOver;
      dom.rollBtn.disabled = !active || state.awaitingChallenge;
      dom.skipBtn.disabled = !active || !state.awaitingChallenge;
      dom.submitAnswerBtn.disabled = !state.awaitingChallenge || state.selectedAnswer === null;
    }

    function restartGame() {
      resetGameState();
      dom.setupPanel.classList.remove('hidden');
      dom.gamePanel.classList.add('hidden');
      dom.challengePanel.classList.add('hidden');
      dom.liveStatus.textContent = t('ready');
      makePlayerInputs();
      renderAll();
    }

    function wireEvents() {
      dom.playerCount.addEventListener('change', makePlayerInputs);
      dom.languageSelect.addEventListener('change', event => {
        state.lang = event.target.value;
        applyLanguage();
      });
      dom.startBtn.addEventListener('click', startGame);
      dom.rollBtn.addEventListener('click', rollDice);
      dom.submitAnswerBtn.addEventListener('click', submitAnswer);
      dom.continueBtn.addEventListener('click', completeTurn);
      dom.skipBtn.addEventListener('click', skipChallenge);
      dom.restartBtn.addEventListener('click', restartGame);
      dom.rulesBtn.addEventListener('click', () => dom.rulesDialog.showModal());
      dom.closeRulesBtn.addEventListener('click', () => dom.rulesDialog.close());
      dom.rulesDialog.addEventListener('cancel', event => { event.preventDefault(); dom.rulesDialog.close(); });
    }

    wireEvents();
    makePlayerInputs();
    applyLanguage();
  </script>
</body>
</html>
