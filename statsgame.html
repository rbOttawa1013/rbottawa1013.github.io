function controls(){return el('div',{class:'row turn'},[el('button',{type:'button',class:'primary',onclick:submit,text:tr('submit')}),el('button',{type:'button',onclick:()=>present(-1),text:tr('prev')}),el('button',{type:'button',onclick:()=>nextRoll(),text:tr('next')})])}
function select(i){if(S.answered)return;S.selected=i;document.querySelectorAll('.answer').forEach((b,n)=>{const active=S.optionOrder[n]===i;b.classList.toggle('selected',active);b.setAttribute('aria-checked',active?'true':'false')})}
function submit(){if(!S.challenge||S.answered)return;if(S.selected==null){$('live').textContent=tr('need');return}S.answered=true;document.querySelectorAll('#challenge .answer').forEach(b=>b.disabled=true);document.querySelectorAll('#challenge .turn button').forEach(b=>{if(b.textContent===tr('submit'))b.disabled=true});const q=S.challenge,ok=S.selected===q.correct;if(ok)S.score+=10;$('challenge').append(answerTable(q),el('div',{class:`feedback ${ok?'ok':'bad'}`,role:'status'},[el('strong',{text:ok?tr('correct'):tr('incorrect')}),el('p',{},[el('strong',{text:tr('explain')+': '}),q.explain[S.lang]]),el('p',{},[el('strong',{text:tr('source')+': '}),q.source])]));const k=keyFor(cell());S.qCursor[k]=((S.qCursor[k]??S.qIndex)+1)%S.pool.length;if(cell().kind==='finish'&&ok){S.won=true;$('challenge').append(el('div',{class:'feedback ok'},el('strong',{text:`${tr('winner')}: ${S.token} ${S.name}`})))}renderPlayer();renderSummary()}
function answerTable(q){return el('table',{class:'answer-table'},[el('caption',{text:tr('answerTable')}),el('thead',{},el('tr',{},[el('th',{scope:'col',text:tr('option')}),el('th',{scope:'col',text:tr('answer')}),el('th',{scope:'col',text:tr('selected')}),el('th',{scope:'col',text:tr('right')})])),el('tbody',{},q.answers[S.lang].map((a,i)=>el('tr',{},[el('th',{scope:'row',text:String.fromCharCode(65+i)}),el('td',{text:a}),el('td',{text:i===S.selected?'✓':''}),el('td',{class:i===q.correct?'correct':'',text:i===q.correct?'✓':''})]))),el('tfoot',{},el('tr',{},el('td',{colspan:'4'},`${tr('explain')}: ${q.explain[S.lang]} | ${tr('source')}: ${q.source}`)))])}
function nextRoll(fromStart=false){if(!S.started||S.won)return;if(!fromStart&&S.challenge&&!S.answered){$('live').textContent=tr('need');return}const r=roll();const c=move(r);renderAll();present(0,el('div',{class:'feedback info',text:`${S.name} ${tr('rolled')} ${r}. ${c.year} — ${c.topic[S.lang]}`}))}
function start(){S.name=($('playerName').value||'Alex').trim();S.started=true;S.won=false;S.score=0;S.pos=0;S.lastRoll=null;S.challenge=null;S.answered=true;S.qCursor={};renderAll();nextRoll(true)}
function restart(){S.started=false;S.won=false;S.score=0;S.pos=0;S.lastRoll=null;S.challenge=null;S.selected=null;S.answered=false;S.qCursor={};renderAll();$('challenge').textContent=tr('notStarted');$('live').textContent=''}
function setLang(lang){S.lang=lang;renderAll();if(S.started&&S.challenge&&!S.won)present()}
function validateContent(){const issues=[];CELLS.forEach(c=>{if(['start','skip','back'].includes(c.kind))return;const pool=poolFor(c.id);['low','medium','high'].forEach(d=>{if((c.id==='mystery'?BANK.mystery:BANK[c.id]||BANK.finish).filter(q=>q.difficulty===d).length<2)issues.push(`${c.id}:${d}`)});pool.forEach(q=>{if(q.square.en!==c.topic.en||q.square.fr!==c.topic.fr)issues.push(`${c.id}:title`);if(q.correct<0||q.correct>=q.answers.en.length||q.answers.en.length!==q.answers.fr.length)issues.push(`${c.id}:answer`)})});return issues}
$('enBtn').onclick=()=>setLang('en');$('frBtn').onclick=()=>setLang('fr');$('difficulty').onchange=()=>{if(S.started&&S.challenge&&!S.won)present();renderAll()};$('startBtn').onclick=start;$('restartBtn').onclick=restart;$('rulesBtn').onclick=()=>alert(tr('rulesBody'));$('contrastBtn').onclick=()=>document.body.classList.toggle('high-contrast');$('printBtn').onclick=()=>window.print();
const contentIssues=validateContent();renderAll();$('challenge').textContent=contentIssues.length?`Content validation issue: ${contentIssues.join(', ')}`:tr('notStarted');
</script>
