let state={lang:'en',started:false,name:'Alex',token:'🦫',pos:0,score:0,challenge:null,pool:[],qIndex:0,selected:null,lastRoll:null,won:false,qCursor:{}};

function startGame(){state.name=($('playerName').value||'Alex').trim();state.started=true;state.won=false;state.pos=0;state.score=0;state.lastRoll=null;state.qCursor={};state.selected=null;renderAll();presentQuestion();}
function restartGame(){state.started=false;state.won=false;state.pos=0;state.score=0;state.lastRoll=null;state.qCursor={};state.selected=null;state.challenge=null;renderAll();$('challenge').textContent=text('notStarted');$('live').textContent='';}

function answerTable(q){const rows=q.answers[state.lang].map((answer,index)=>make('tr',{},[make('th',{scope:'row',text:String.fromCharCode(65+index)}),make('td',{text:answer}),make('td',{text:index===state.selected?'✓':''}),make('td',{class:index===q.correct?'correct':'',text:index===q.correct?'✓':''})]));return make('table',{class:'answer-table'},[make('caption',{text:text('answerTable')}),make('thead',{},make('tr',{},[make('th',{scope:'col',text:text('option')}),make('th',{scope:'col',text:text('answer')}),make('th',{scope:'col',text:text('selected')}),make('th',{scope:'col',text:text('right')})])),make('tbody',{},rows),make('tfoot',{},make('tr',{},make('td',{colspan:'4'},`${text('explain')}: ${q.explain[state.lang]} | ${text('source')}: ${q.source}`)))])}
