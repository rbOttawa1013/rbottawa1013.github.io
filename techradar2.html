<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technology Radar</title>
  <style>
    :root { --bg:#f8fafc; --card:#fff; --ink:#0f172a; --muted:#64748b; --line:#cbd5e1; --accent:#2563eb; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    :focus-visible { outline:3px solid var(--accent); outline-offset:3px; }
    header { background:#0f172a; color:white; padding:1.5rem; }
    main { max-width:1200px; margin:auto; padding:1rem; display:grid; gap:1rem; grid-template-columns:1.3fr .7fr; }
    .card { background:var(--card); border:1px solid #e2e8f0; border-radius:1rem; box-shadow:0 10px 30px rgba(15,23,42,.08); padding:1rem; }
    #radarWrap { position:relative; aspect-ratio:1/1; min-height:420px; }
    svg { width:100%; height:100%; }
    label { display:grid; gap:.3rem; font-weight:700; margin:.7rem 0; }
    input, select, textarea, button { font:inherit; border-radius:.55rem; border:1px solid #cbd5e1; padding:.6rem; }
    button { cursor:pointer; font-weight:800; border:0; background:var(--accent); color:white; }
    button.secondary { background:#475569; }
    button.danger { background:#b91c1c; }
    table { width:100%; border-collapse:collapse; font-size:.9rem; }
    th, td { padding:.55rem; border-bottom:1px solid #e2e8f0; text-align:left; }
    .pill { display:inline-block; border-radius:999px; padding:.18rem .55rem; background:#dbeafe; color:#1e40af; font-weight:800; font-size:.78rem; }
    @media (max-width:900px){ main{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header>
    <p style="margin:0;color:#bfdbfe;text-transform:uppercase;letter-spacing:.08em;font-size:.8rem">Local-first portfolio tool</p>
    <h1 style="margin:.25rem 0 0">Technology Radar</h1>
    <p style="margin:.5rem 0 0;color:#e2e8f0;max-width:75ch">Track technologies across quadrants and maturity rings. Data is saved in this browser and can be exported as JSON.</p>
  </header>

  <main>
    <section class="card" aria-labelledby="radarTitle">
      <h2 id="radarTitle">Radar view</h2>
      <div id="radarWrap"><svg id="radar" viewBox="0 0 800 800" role="img" aria-label="Technology radar diagram"></svg></div>
    </section>

    <aside class="card" aria-labelledby="editorTitle">
      <h2 id="editorTitle">Blip editor</h2>
      <form id="blipForm">
        <label>Name <input id="name" required value="WebAssembly" /></label>
        <label>Description <textarea id="description" rows="3">High-performance browser and edge runtime option.</textarea></label>
        <label>Quadrant <select id="quadrant"><option>Techniques</option><option>Tools</option><option selected>Platforms</option><option>Languages & Frameworks</option></select></label>
        <label>Ring <select id="ring"><option selected>Adopt</option><option>Trial</option><option>Assess</option><option>Hold</option></select></label>
        <label>Status <select id="status"><option>New</option><option selected>Changed</option><option>Stable</option><option>Deprecated</option></select></label>
        <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem">
          <button type="submit">Save blip</button><button type="button" id="newBtn" class="secondary">New</button><button type="button" id="deleteBtn" class="danger">Delete selected</button>
        </div>
      </form>
      <hr style="border:0;border-top:1px solid #e2e8f0;margin:1rem 0" />
      <div style="display:flex;flex-wrap:wrap;gap:.5rem"><button id="exportBtn" type="button">Export JSON</button><label style="margin:0"><span class="pill">Import JSON</span><input id="importFile" type="file" accept="application/json,.json" style="position:absolute;left:-9999px" /></label></div>
    </aside>

    <section class="card" style="grid-column:1/-1" aria-labelledby="listTitle">
      <h2 id="listTitle">Blips</h2>
      <table><thead><tr><th>Name</th><th>Quadrant</th><th>Ring</th><th>Status</th><th>Description</th></tr></thead><tbody id="rows"></tbody></table>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'rbottawa-tech-radar-v2';
    const quadrants = ['Techniques','Tools','Platforms','Languages & Frameworks'];
    const rings = ['Adopt','Trial','Assess','Hold'];
    let selectedId = null;
    const $ = id => document.getElementById(id);
    const escapeHtml = value => String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    function load(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || seed(); } catch { return seed(); } }
    function save(items){ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
    function seed(){ const items=[{id:crypto.randomUUID(),name:'WebAssembly',description:'High-performance browser and edge runtime option.',quadrant:'Platforms',ring:'Adopt',status:'Changed'}]; save(items); return items; }
    function colour(status){ return {New:'#2563eb',Changed:'#f97316',Stable:'#16a34a',Deprecated:'#64748b'}[status] || '#334155'; }
    function position(blip){ const q=quadrants.indexOf(blip.quadrant); const r=rings.indexOf(blip.ring); const angle=(q*90+45) * Math.PI/180; const radius=80 + r*75; return {x:400+Math.cos(angle)*radius, y:400+Math.sin(angle)*radius}; }
    function render(){ const items=load(); const svg=$('radar'); svg.innerHTML=''; [320,245,170,95].forEach(rad=> svg.insertAdjacentHTML('beforeend',`<circle cx="400" cy="400" r="${rad}" fill="none" stroke="#cbd5e1"/>`)); svg.insertAdjacentHTML('beforeend','<line x1="400" y1="80" x2="400" y2="720" stroke="#cbd5e1"/><line x1="80" y1="400" x2="720" y2="400" stroke="#cbd5e1"/>'); quadrants.forEach((q,i)=>{ const coords=[[600,210],[200,210],[200,610],[600,610]][i]; svg.insertAdjacentHTML('beforeend',`<text x="${coords[0]}" y="${coords[1]}" text-anchor="middle" font-weight="700" fill="#64748b">${q}</text>`); }); items.forEach(blip=>{ const p=position(blip); svg.insertAdjacentHTML('beforeend',`<g tabindex="0" role="button" aria-label="${escapeHtml(blip.name)}" data-id="${blip.id}"><circle cx="${p.x}" cy="${p.y}" r="11" fill="${colour(blip.status)}" stroke="${blip.id===selectedId?'#0f172a':'white'}" stroke-width="4"/><text x="${p.x+15}" y="${p.y+4}" font-size="14">${escapeHtml(blip.name)}</text></g>`); }); document.querySelectorAll('[data-id]').forEach(g=>g.addEventListener('click',()=>select(g.dataset.id))); $('rows').innerHTML=items.map(b=>`<tr><td><button class="secondary" type="button" data-row="${b.id}">${escapeHtml(b.name)}</button></td><td>${escapeHtml(b.quadrant)}</td><td>${escapeHtml(b.ring)}</td><td><span class="pill">${escapeHtml(b.status)}</span></td><td>${escapeHtml(b.description)}</td></tr>`).join(''); document.querySelectorAll('[data-row]').forEach(btn=>btn.addEventListener('click',()=>select(btn.dataset.row))); }
    function select(id){ const item=load().find(x=>x.id===id); if(!item) return; selectedId=id; ['name','description','quadrant','ring','status'].forEach(k=>$(k).value=item[k]); render(); }
    $('blipForm').addEventListener('submit', e=>{ e.preventDefault(); const items=load(); const data={ id:selectedId || crypto.randomUUID(), name:$('name').value.trim(), description:$('description').value.trim(), quadrant:$('quadrant').value, ring:$('ring').value, status:$('status').value }; const idx=items.findIndex(x=>x.id===data.id); if(idx>=0) items[idx]=data; else items.push(data); selectedId=data.id; save(items); render(); });
    $('newBtn').addEventListener('click',()=>{ selectedId=null; $('blipForm').reset(); });
    $('deleteBtn').addEventListener('click',()=>{ if(!selectedId) return; save(load().filter(x=>x.id!==selectedId)); selectedId=null; $('blipForm').reset(); render(); });
    $('exportBtn').addEventListener('click',()=>{ const blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='technology-radar.json'; a.click(); URL.revokeObjectURL(a.href); });
    $('importFile').addEventListener('change', e=>{ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ try{ const data=JSON.parse(reader.result); if(!Array.isArray(data)) throw new Error(); save(data); selectedId=null; render(); } catch { alert('Invalid radar JSON.'); } }; reader.readAsText(file); e.target.value=''; });
    render();
  </script>
</body>
</html>
